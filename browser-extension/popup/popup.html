<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapAuth - Sovereign Login</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="#7C3AED" opacity="0.3"/>
          <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
          <path d="M10 12l2 2 4-4" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="header-title">CapAuth</div>
        <div class="header-subtitle">Sovereign Login</div>
      </div>
    </div>
    <button class="settings-btn" id="btn-settings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>
  </header>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-indicator" id="connection-status">
      <div class="dot checking" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>
  </div>

  <!-- Identity Section -->
  <div class="identity-section" id="identity-section">
    <div class="fingerprint-label">PGP Fingerprint</div>
    <div class="fingerprint-display" id="fingerprint-display">
      <span class="fingerprint-text" id="fingerprint-text">Not configured</span>
    </div>
  </div>

  <!-- Main Content -->
  <main class="content">

    <!-- Sign In Button -->
    <div class="section">
      <button class="btn-signin" id="btn-signin" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M10 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="signin-label">Sign In with CapAuth</span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Service URL -->
    <div class="section">
      <div class="section-label">Service</div>
      <div class="service-display" id="service-display">
        <span id="service-text">No service configured</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Auth Result (hidden by default) -->
    <div class="section" id="auth-result" style="display:none">
      <div class="section-label">Authentication</div>
      <div class="auth-card" id="auth-card">
        <div class="auth-status-row">
          <div class="auth-status-icon" id="auth-status-icon"></div>
          <span id="auth-status-text">Authenticated</span>
        </div>
        <div class="auth-detail" id="auth-detail"></div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    Sovereign Identity &mdash;
    <a href="https://capauth.io" target="_blank">capauth.io</a>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
